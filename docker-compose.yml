services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sofia-api
    restart: unless-stopped
    command: npm run dev:api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sofia}:${POSTGRES_PASSWORD:-sofia_dev_password}@postgres:5432/${POSTGRES_DB:-sofia}?schema=public
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: sofia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sofia}
      POSTGRES_USER: ${POSTGRES_USER:-sofia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sofia_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sofia} -d ${POSTGRES_DB:-sofia}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  api_node_modules:
  postgres_data:
